services:
  postgres1:
    image: postgres:15
    container_name: postgres_instance_1
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres1_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - postgres_network

  postgres2:
    image: postgres:15
    container_name: postgres_instance_2
    environment:
      POSTGRES_DB: target_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres2_data:/var/lib/postgresql/data
    networks:
      - postgres_network

volumes:
  postgres1_data:
  postgres2_data:

networks:
  postgres_network:
    driver: bridge
